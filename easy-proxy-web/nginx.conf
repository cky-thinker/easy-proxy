server {
    listen 10093;
    server_name localhost;

    # serve static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # proxy api requests
    location /api/ {
        # Assuming the backend service is named 'easy-proxy-server' in docker-compose
        # and running on port 10091
        proxy_pass http://easy-proxy-server:10091/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
