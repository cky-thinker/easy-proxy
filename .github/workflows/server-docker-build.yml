name: Server Docker Build

on:
  push:
    paths:
      - 'easy-proxy-server/**'
      - 'easy-proxy-client/**'
      - 'easy-proxy-common/**'
      - 'pom.xml'
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Client
        uses: docker/build-push-action@v5
        with:
          context: ./easy-proxy-client
          file: ./easy-proxy-client/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/easy-proxy-client:${{ github.ref_name }}
            ${{ secrets.DOCKER_USERNAME }}/easy-proxy-client:latest

      - name: Build and push Server
        uses: docker/build-push-action@v5
        with:
          context: ./easy-proxy-server
          file: ./easy-proxy-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/easy-proxy-server:${{ github.ref_name }}
            ${{ secrets.DOCKER_USERNAME }}/easy-proxy-server:latest
